<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>tastify — Static HTML Example</title>
  <link rel="stylesheet" href="https://unpkg.com/@tastify/vanilla/dist/styles.css" />
  <style>
    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 600px;
      margin: 4rem auto;
      padding: 0 1rem;
    }
  </style>
</head>
<body>
  <h1>My Music</h1>

  <!--
    Each data-tastify element becomes a widget.
    You need to deploy your own /api/spotify/token endpoint.
    Run `npx tastify init` to generate one for your platform.
  -->

  <div data-tastify="now-playing"></div>

  <div data-tastify="top-tracks" data-limit="5" style="margin-top: 2rem;"></div>

  <div data-tastify="recently-played" data-limit="5" style="margin-top: 2rem;"></div>

  <!--
    The data-tastify-token-url attribute on the script tag
    tells all widgets where to fetch their access token.
    Replace with your deployed token endpoint URL.
  -->
  <script
    src="https://unpkg.com/@tastify/vanilla"
    data-tastify-token-url="https://your-site.com/api/spotify/token"
  ></script>
</body>
</html>
